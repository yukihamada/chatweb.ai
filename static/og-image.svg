  <rect x="200" y="430" width="160" height="38" rx="19" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.3"/>
  <text x="280" y="454" text-anchor="middle" font-size="13" font-family="system-ui,sans-serif" fill="#a78bfa">39+ AI Agents</text>
  <rect x="380" y="430" width="160" height="38" rx="19" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-opacity="0.3"/>
  <text x="460" y="454" text-anchor="middle" font-size="13" font-family="system-ui,sans-serif" fill="#67e8f9">6 AI Models</text>
  <rect x="560" y="430" width="160" height="38" rx="19" fill="#34d399" fill-opacity="0.1" stroke="#34d399" stroke-opacity="0.3"/>
  <text x="640" y="454" text-anchor="middle" font-size="13" font-family="system-ui,sans-serif" fill="#6ee7b7">A2A Protocol</text>
