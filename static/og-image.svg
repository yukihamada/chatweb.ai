  <text x="830" y="454" text-anchor="middle" font-size="13" font-family="system-ui,sans-serif" fill="#f9a8d4">LINE / Telegram</text>
  <text x="600" y="550" text-anchor="middle" font-size="18" font-family="system-ui,sans-serif" fill="#71717a">Multi-Agent AI Platform — Free to start</text>
