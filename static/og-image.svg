  <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-opacity="0.03"/>
  <circle cx="600" cy="280" r="300" fill="#6366f1" fill-opacity="0.06" filter="url(#glow)"/>
  <text x="600" y="220" text-anchor="middle" font-size="80" font-family="system-ui,sans-serif" fill="url(#accent)" filter="url(#glow)">◈</text>
  <text x="600" y="320" text-anchor="middle" font-size="72" font-weight="800" font-family="system-ui,-apple-system,sans-serif" fill="#fafafa" letter-spacing="-2">chatweb.ai</text>
